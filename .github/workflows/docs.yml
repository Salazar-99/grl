name: Publish Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish docs image
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCS_IMAGE_NAME }}
      REGISTRY: ${{ secrets.DOCS_REGISTRY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCS_REGISTRY }}
          username: ${{ secrets.DOCS_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCS_REGISTRY_PASSWORD }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: docs
          file: docs/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCS_IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.DOCS_IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
