syntax = "proto3";

package grl.environment.v1;

// EnvironmentService manages Firecracker-backed RL environments.
//
// Per-rollout lifecycle (strict ordering after CreateEnvironment):
//   CreateEnvironment → Execute* → Evaluate → Teardown
//
// Execute accepts bash tools until the agent calls the standard "submit" tool.
// After Evaluate, only Teardown is valid for that env_id.
service EnvironmentService {
  // ListTasks returns the task index loaded at manager startup. Trainers call
  // this instead of reading tasks.jsonl from object storage.
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  // Non-blocking: returns catalog prompt/tools immediately while the VM boots
  // asynchronously. Execute/Evaluate return UNAVAILABLE until the env is ready.
  rpc CreateEnvironment(CreateEnvironmentRequest) returns (CreateEnvironmentResponse);
  // Run one tool call (bash, submit, etc.) inside the environment.
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
  // Grade the finished trajectory. Callable once per env_id. The environment
  // owns the reward (e.g. held-out test suite); the manager relays the result.
  // Allowed from Ready or Submitted (max turns without submit still grades).
  // After Evaluate, only Teardown is valid.
  rpc Evaluate(EvaluateRequest) returns (EvaluateResponse);
  // Tear down the environment and free resources. Best-effort; always succeeds.
  rpc Teardown(TeardownRequest) returns (TeardownResponse);
}

message CreateEnvironmentRequest {
  string task_id = 1;
}

message ListTasksRequest {
  // When non-empty, only tasks with this split are returned.
  string split = 1;
}

message TaskIndexEntry {
  string task_id = 1;
  string split = 2;
}

message ListTasksResponse {
  repeated TaskIndexEntry tasks = 1;
  // Environment product name (GRL_ENV_ID on the manager pod), if set.
  string env_name = 2;
}

message CreateEnvironmentResponse {
  string env_id = 1;
  // Direct address ("host:port") of the manager instance that owns this
  // environment. Clients re-dial it for all subsequent calls on this env so
  // routing survives connection resets behind a load-balanced Service.
  // Empty means: keep using the address you dialed.
  string manager_addr = 2;
  // The environment renders the task's opening prompt and tool schemas so the
  // trainer stays environment-agnostic: it never parses SWE-bench rows, it just
  // forwards these to the policy. Both are JSON the client hands to the chat
  // template verbatim.
  //   initial_messages_json: a JSON array of OpenAI-style chat messages.
  //   tools_json: a JSON array of tool/function schemas.
  string initial_messages_json = 3;
  string tools_json = 4;
}

message EvaluateRequest {
  string env_id = 1;
}

message EvaluateResponse {
  // Scalar task reward (e.g. 1.0 if resolved, else 0.0).
  double reward = 1;
  // Optional JSON breakdown for logging/curriculum (per-test results, counts).
  string detail_json = 2;
  // When true, the trainer must exclude this rollout from GRPO (infra failure).
  bool infra_error = 3;
}

message ExecuteRequest {
  string env_id = 1;
  string tool_name = 2;
  string arguments_json = 3;
}

message ExecuteResponse {
  string content = 1;
  bool is_error = 2;
}

message TeardownRequest {
  string env_id = 1;
}

message TeardownResponse {}
