rayCluster:
  name: grl-ray
  namespace: default
  version: 2.55.1
  images:
    head: grl-training:head
    rollouts: grl-training:rollouts
    training: grl-training:training
  workers:
    rollouts:
      gpusPerNode: 1
      replicas: 1
      # RolloutWorker starts a prometheus_client server here to expose
      # in-process vLLM engine metrics; scraped by the otel collector.
      vllmMetricsPort: 9090
    training:
      gpusPerNode: 1
      replicas: 1

otelCollector:
  name: grl-collector
  namespace: default
  # External collector VM (owns the ClickHouse export). Always TLS with
  # basic auth; credentials are injected from Terraform variables.
  upstream:
    # OTLP/HTTP via the ingress (TLS on 443, routed to the collector's :4318).
    # The otlphttp exporter appends /v1/{traces,metrics,logs}.
    endpoint: https://otel.gerardosalazar.com
    username: ""
    password: ""

# Environment-agnostic Rust gRPC server (environments/manager/Dockerfile).
# Runs as a DaemonSet: one pod per environment node, booting Firecracker VMs
# from the vmImageCache hostPath. Rollout workers reach it through a ClusterIP
# Service.
manager:
  name: grl-manager
  namespace: default
  image: grl-manager:latest
  port: 50051
  # Optional environment label surfaced in metrics/ListTasks (GRL_ENV_ID).
  envId: ""
  # Subdirectory under vmImageCache.hostPath where the bundle-sync DaemonSet
  # (the launcher-owned `environments` chart) writes the active bundle's
  # tasks.jsonl. The manager reads {hostPath}/{activeDir}/tasks.jsonl and
  # hot-reloads it; this value MUST match the environments chart's activeDir.
  activeDir: active
  # Max rollout environments in flight on this manager pod (admission control).
  maxConcurrentEnvs: "32"

vmImageCache:
  namespace: default
  # S3 bucket holding VM artifacts (the vms tooling's VMS_S3_BUCKET).
  # Empty disables the DaemonSet; injected from Terraform variables.
  bucket: ""
  region: us-west-2
  image: peakcom/s5cmd:v2.3.0
  pauseImage: registry.k8s.io/pause:3.10
  # Node-local cache directory; the manager mounts this read-only and boots
  # Firecracker VMs from it.
  hostPath: /var/lib/grl
  # Size of the per-VM scratch template (sparse, journal-less ext4). Bounds each
  # microVM's writable overlay; sparse so it costs only what's written.
  scratchGb: 2

# Hugging Face model weights cached on GPU nodes (rollouts + training).
# Weights land at hostPath/<repo-name> (e.g. /models/Qwen2.5-7B for
# Qwen/Qwen2.5-7B). Empty tag disables the DaemonSet and the matching
# hostPath mounts on Ray rollouts/training workers.
modelCache:
  namespace: default
  tag: ""
  revision: ""
  # Optional HF token: higher rate limits, gated models, and hf_transfer.
  huggingfaceToken: ""
  image: python:3.12-slim
  pauseImage: registry.k8s.io/pause:3.10
  hostPath: /models
