{{- if .Values.vmImageCache.bucket }}
# Pre-pulls Firecracker VM artifacts (guest kernel, base/task squashfs images)
# from S3 onto each environment node's local disk, so the manager can boot
# microVMs from local files without touching S3 on the hot path. It also stages
# a node-local ext4 scratch template the manager copies per microVM.
#
# The sync runs in an initContainer: the pod only reaches Running once the
# cache is warm, and a failed sync retries from where it left off (s5cmd sync
# skips objects already on disk). The manager gates its own startup on the
# .ready sentinel written after a complete sync.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vm-image-cache
  namespace: {{ .Values.vmImageCache.namespace | quote }}
  labels:
    app: vm-image-cache
spec:
  selector:
    matchLabels:
      app: vm-image-cache
  template:
    metadata:
      labels:
        app: vm-image-cache
    spec:
      nodeSelector:
        role: environments
      initContainers:
        - name: sync
          image: {{ .Values.vmImageCache.image | quote }}
          env:
            # s5cmd resolves credentials from the node role via IMDS, but
            # does not resolve the region from it; set it explicitly.
            - name: AWS_REGION
              value: {{ .Values.vmImageCache.region | quote }}
            - name: BUCKET
              value: {{ .Values.vmImageCache.bucket | quote }}
            - name: SCRATCH_GB
              value: {{ .Values.vmImageCache.scratchGb | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              rm -f /data/.ready
              mkdir -p /data/kernel /data/images/bases /data/images/tasks
              /s5cmd sync "s3://${BUCKET}/kernel/*" /data/kernel/
              /s5cmd sync "s3://${BUCKET}/bases/*"  /data/images/bases/
              /s5cmd sync "s3://${BUCKET}/tasks/*"  /data/images/tasks/
              # Node-local per-VM scratch template: a pre-formatted, journal-less
              # ext4 the manager copies per boot as each microVM's writable
              # overlay upper. Journalless keeps its real footprint at a few MB
              # (sparse), so the per-VM copy is fast; scratch is ephemeral so
              # journaling is pointless. Not shipped via S3 (a sparse ext4 would
              # upload as full-size zeros). Recreate when SCRATCH_GB changes.
              WANT_BYTES=$((SCRATCH_GB * 1024 * 1024 * 1024))
              CUR_BYTES=0
              if [ -f /data/scratch-template.ext4 ]; then
                CUR_BYTES=$(stat -c%s /data/scratch-template.ext4 2>/dev/null || echo 0)
              fi
              if [ ! -f /data/scratch-template.ext4 ] || [ "$CUR_BYTES" != "$WANT_BYTES" ]; then
                apk add --no-cache e2fsprogs
                rm -f /data/scratch-template.ext4
                truncate -s "${SCRATCH_GB}G" /data/scratch-template.ext4
                mkfs.ext4 -F -O ^has_journal /data/scratch-template.ext4
              fi
              touch /data/.ready
          resources:
            requests:
              cpu: "1"
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 1Gi
          volumeMounts:
            - name: cache
              mountPath: /data
      containers:
        # All work happens in the initContainer; this keeps the pod Running
        # so `kubectl get pods` shows which nodes have a warm cache.
        - name: pause
          image: {{ .Values.vmImageCache.pauseImage | quote }}
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: cache
          hostPath:
            path: {{ .Values.vmImageCache.hostPath | quote }}
            type: DirectoryOrCreate
{{- end }}
