# Environment manager: the shared, environment-agnostic gRPC server that owns
# Firecracker VM lifecycle and tool call dispatch (environments/manager/).
#
# One pod per environment node (DaemonSet), since capacity is a property of
# the node (/dev/kvm, memory for microVMs, the local VM image cache). Rollout
# workers connect through the ClusterIP Service below with one gRPC channel
# per environment: a channel is a single TCP connection, so kube-proxy pins
# each environment to one manager pod while spreading environments across pods.
#
# per-run environment bundles: the launcher sets manager.bundleUri (and optional
# manager.envId), then rolls the DaemonSet. The sync-bundle initContainer pulls
# tasks.jsonl into {{ .Values.vmImageCache.hostPath }}/active/ before the manager
# loads the catalog at startup.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Values.manager.name | quote }}
  namespace: {{ .Values.manager.namespace | quote }}
  labels:
    app: {{ .Values.manager.name | quote }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.manager.name | quote }}
  template:
    metadata:
      labels:
        app: {{ .Values.manager.name | quote }}
    spec:
      nodeSelector:
        role: environment
      initContainers:
        - name: sync-bundle
          image: {{ .Values.vmImageCache.image | quote }}
          env:
            - name: AWS_REGION
              value: {{ .Values.vmImageCache.region | quote }}
            - name: GRL_VM_CACHE_DIR
              value: {{ .Values.vmImageCache.hostPath | quote }}
            - name: GRL_ACTIVE_DIR
              value: {{ .Values.manager.activeDir | quote }}
            - name: GRL_BUNDLE_URI
              value: {{ .Values.manager.bundleUri | quote }}
            - name: GRL_TASKS_FILE
              value: {{ .Values.vmImageCache.hostPath }}/{{ .Values.manager.activeDir }}/tasks.jsonl
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              CACHE_ROOT="${GRL_VM_CACHE_DIR}"
              ACTIVE="${CACHE_ROOT}/${GRL_ACTIVE_DIR}"
              TASKS_FILE="${GRL_TASKS_FILE}"
              mkdir -p "${ACTIVE}"
              rm -f "${ACTIVE}/.ready"
              if [ -n "${GRL_BUNDLE_URI}" ]; then
                echo "syncing bundle ${GRL_BUNDLE_URI} -> ${ACTIVE}/"
                /s5cmd sync "${GRL_BUNDLE_URI}/*" "${ACTIVE}/"
              elif [ ! -f "${TASKS_FILE}" ]; then
                echo "GRL_BUNDLE_URI unset and ${TASKS_FILE} missing; catalog will be empty" >&2
              fi
              touch "${ACTIVE}/.ready"
          volumeMounts:
            - name: vm-cache
              mountPath: {{ .Values.vmImageCache.hostPath | quote }}
          resources:
            requests:
              cpu: "1"
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 1Gi
      containers:
        - name: manager
          image: {{ .Values.manager.image | quote }}
          env:
            # Push manager metrics to the same in-cluster collector the Ray
            # workers use (telemetry.rs no-ops if this is unset). HOSTNAME (the
            # pod name) and GRL_ENV_ID below become the `pod`/`env.id` resource
            # attributes the dashboard breaks out by.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://{{ .Values.otelCollector.name }}-collector.{{ .Values.otelCollector.namespace }}.svc:4317
            - name: GRL_ENV_SERVER_ADDR
              value: 0.0.0.0:{{ .Values.manager.port }}
            - name: GRL_VM_CACHE_DIR
              value: {{ .Values.vmImageCache.hostPath | quote }}
            - name: GRL_ACTIVE_DIR
              value: {{ .Values.manager.activeDir | quote }}
            - name: GRL_BUNDLE_URI
              value: {{ .Values.manager.bundleUri | quote }}
            - name: GRL_ENV_ID
              value: {{ .Values.manager.envId | quote }}
            - name: GRL_TASKS_FILE
              value: {{ .Values.vmImageCache.hostPath }}/{{ .Values.manager.activeDir }}/tasks.jsonl
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Returned in CreateEnvironmentResponse.manager_addr; clients
            # re-dial this pod directly for the environment's lifetime instead
            # of relying on the Service connection staying pinned.
            - name: GRL_MANAGER_ADVERTISE_ADDR
              value: "$(POD_IP):{{ .Values.manager.port }}"
            - name: GRL_MAX_CONCURRENT_ENVS
              value: {{ .Values.manager.maxConcurrentEnvs | quote }}
          ports:
            - name: grpc
              containerPort: {{ .Values.manager.port }}
          # Firecracker needs /dev/kvm and tap devices on the host.
          securityContext:
            privileged: true
          volumeMounts:
            - name: vm-cache
              mountPath: {{ .Values.vmImageCache.hostPath | quote }}
              readOnly: true
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "8"
              memory: 32Gi
      volumes:
        - name: vm-cache
          hostPath:
            path: {{ .Values.vmImageCache.hostPath | quote }}
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.manager.name | quote }}
  namespace: {{ .Values.manager.namespace | quote }}
  labels:
    app: {{ .Values.manager.name | quote }}
spec:
  selector:
    app: {{ .Values.manager.name | quote }}
  ports:
    - name: grpc
      port: {{ .Values.manager.port }}
      targetPort: grpc
