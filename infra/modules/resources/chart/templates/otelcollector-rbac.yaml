apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.otelCollector.name | quote }}
  namespace: {{ .Values.otelCollector.namespace | quote }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.otelCollector.name }}-discovery
rules:
  - apiGroups: [""]
    resources:
      - pods
      - nodes
      - services
      - endpoints
      - namespaces
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.otelCollector.name }}-discovery
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.otelCollector.name }}-discovery
subjects:
  - kind: ServiceAccount
    name: {{ .Values.otelCollector.name | quote }}
    namespace: {{ .Values.otelCollector.namespace | quote }}
