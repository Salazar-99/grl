apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcgm-exporter
  namespace: {{ .Values.dcgmExporter.namespace | quote }}
  labels:
    app: dcgm-exporter
spec:
  selector:
    matchLabels:
      app: dcgm-exporter
  template:
    metadata:
      labels:
        app: dcgm-exporter
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - rollouts
                      - training
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: dcgm-exporter
          image: {{ .Values.dcgmExporter.image | quote }}
          env:
            - name: DCGM_EXPORTER_LISTEN
              value: ":9400"
            # Map GPU metrics to the pod using them via the kubelet
            # pod-resources socket.
            - name: DCGM_EXPORTER_KUBERNETES
              value: "true"
          ports:
            - name: metrics
              containerPort: 9400
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 512Mi
          volumeMounts:
            - name: pod-resources
              mountPath: /var/lib/kubelet/pod-resources
              readOnly: true
      volumes:
        - name: pod-resources
          hostPath:
            path: /var/lib/kubelet/pod-resources
