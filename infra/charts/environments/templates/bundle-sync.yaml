{{- if .Values.bundleUri }}
# Per-run bundle sync: pulls the active environment bundle (tasks.jsonl) from S3
# onto each environment node's local cache and touches the .ready sentinel the
# manager watches to hot-reload its catalog — no manager restart.
#
# Owned by the launcher (applied only during the ENVS deployment layer), separate
# from the Terraform-managed base-image cache (vm-image-cache) so the two never
# share a Helm release. The bundleUri annotation makes a bundle change alter the
# pod template, so `helm upgrade` rolls the DaemonSet and re-runs the sync.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: grl-bundle-sync
  namespace: {{ .Values.namespace | quote }}
  labels:
    app: grl-bundle-sync
spec:
  selector:
    matchLabels:
      app: grl-bundle-sync
  template:
    metadata:
      labels:
        app: grl-bundle-sync
      annotations:
        grl.io/bundleUri: {{ .Values.bundleUri | quote }}
    spec:
      nodeSelector:
        role: environments
      initContainers:
        - name: sync-bundle
          image: {{ .Values.image | quote }}
          env:
            # s5cmd resolves credentials from the node role via IMDS, but does
            # not resolve the region from it; set it explicitly.
            - name: AWS_REGION
              value: {{ .Values.region | quote }}
            - name: GRL_VM_CACHE_DIR
              value: {{ .Values.hostPath | quote }}
            - name: GRL_ACTIVE_DIR
              value: {{ .Values.activeDir | quote }}
            - name: GRL_BUNDLE_URI
              value: {{ .Values.bundleUri | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              ACTIVE="${GRL_VM_CACHE_DIR}/${GRL_ACTIVE_DIR}"
              BUNDLES="${GRL_VM_CACHE_DIR}/bundles"
              STAGE="${BUNDLES}/.staging-$$"
              mkdir -p "${BUNDLES}"
              rm -rf "${STAGE}"
              mkdir -p "${STAGE}"
              echo "syncing immutable bundle ${GRL_BUNDLE_URI} -> ${STAGE}/"
              /s5cmd sync "${GRL_BUNDLE_URI}/*" "${STAGE}/"
              test -s "${STAGE}/tasks.jsonl"
              test -s "${STAGE}/environment.squashfs"
              test -s "${STAGE}/environment-manifest.json"
              test -s "${STAGE}/environment.squashfs.sha256"
              EXPECTED=$(awk '{print $1}' "${STAGE}/environment.squashfs.sha256")
              echo "$EXPECTED  ${STAGE}/environment.squashfs" | sha256sum -c -
              VERSION=$(
                cd "${STAGE}"
                find . -type f -exec sha256sum {} \; | sort | sha256sum | awk '{print $1}'
              )
              FINAL="${BUNDLES}/${VERSION}"
              touch "${STAGE}/.ready"
              if [ -d "${FINAL}" ]; then
                rm -rf "${STAGE}"
              else
                mv "${STAGE}" "${FINAL}"
              fi

              # Publish the entire bundle with one rename. Catalog loading
              # canonicalizes this symlink, so an old catalog remains pinned to
              # its matching environment package after the switch.
              rm -f "${ACTIVE}.next"
              ln -s "${FINAL}" "${ACTIVE}.next"
              if [ -d "${ACTIVE}" ] && [ ! -L "${ACTIVE}" ]; then
                rm -rf "${ACTIVE}"
              fi
              mv -Tf "${ACTIVE}.next" "${ACTIVE}"

          volumeMounts:
            - name: vm-cache
              mountPath: {{ .Values.hostPath | quote }}
          resources:
            requests:
              cpu: "1"
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 1Gi
      containers:
        # All work happens in the initContainer; this keeps the pod Running so
        # `kubectl get pods` shows which nodes have the active bundle staged.
        - name: pause
          image: {{ .Values.pauseImage | quote }}
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: vm-cache
          hostPath:
            path: {{ .Values.hostPath | quote }}
            type: DirectoryOrCreate
{{- end }}
