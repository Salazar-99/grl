model:
  path: /models/Qwen2.5-7B

environment:
  id: null
  bundle_uri: null
  split: null
  server_addr: localhost:50051
  retry:
    max_attempts: 10
    initial_backoff_secs: 0.5
    max_backoff_secs: 30.0
  # Client-side gRPC deadlines. Defaults follow prime-rl SWE reference configs
  # (sandbox_command_timeout=30, eval timeout.rollout=3600, score ~900s).
  rpc_timeouts:
    create_secs: 30
    list_tasks_secs: 30
    execute_default_secs: 140
    execute_submit_secs: 10
    execute_timeout_buffer_secs: 10
    evaluate_secs: 930
    teardown_secs: 30

grpo:
  beta: 0.001
  epsilon: 0.2
  learning_rate: 1.0e-6
  num_rollouts: 8
  groups_per_batch: 4
  min_rollouts_per_group: 2
  temperature: 1.0
  top_p: 1.0

workers:
  num_rollout_workers: 1
  num_training_workers: 1
  max_in_flight_rollouts: 32

rollout:
  max_model_len: 8192
  max_num_seqs: 64
  max_concurrent_trajectories: 32
  max_tokens_per_turn: 512
  max_assistant_turns: 8
  enable_prefix_caching: true
  vllm_metrics_port: 9090
  generation_timeout_secs: 600
  trajectory_timeout_secs: 3600

pipeline:
  pending_tasks_queue_size: 64
  completed_rollouts_queue_size: 256
  train_batches_queue_size: 16
  seed: 0
  group_assembly_timeout_secs: 3900
  group_poll_interval_secs: 5

telemetry:
  run_id: null
  otel_endpoint: null

ray:
  ignore_reinit_error: true
